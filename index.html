<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarjeta BEM Moderna</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">

        <img src="assets/img/logo-removebg-preview.png"
             alt="Logo"
             class="card__image">

        <div class="card__content">

            <h1 class="card__title">
                Tarjeta BEM
            </h1>

            <p class="card__description">
                Diseño moderno utilizando la metodología BEM para una estructura limpia y escalable.
            </p>

        </div>

        <div class="card__actions">

            <button class="card__button card__button--primary">
                Aceptar
            </button>

            <button class="card__button card__button--secondary">
                Cancelar
            </button>

        </div>

    </div>

</body>
</html>
